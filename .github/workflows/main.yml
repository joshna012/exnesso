name: Run MT5 Trading Bot

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab and API dispatches

jobs:
  run-bot:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install MetaTrader5 numpy

      - name: Download MetaTrader 5 Installer
        shell: powershell
        run: |
          Write-Host "Downloading Exness MT5 Installer..."
          curl.exe -L -o exness5setup.exe https://download.mql5.com/cdn/web/exness.technologies.ltd/mt5/exness5setup.exe

      - name: Install MetaTrader 5 Silently
        shell: powershell
        run: |
          Write-Host "Installing Exness MT5 (unattended)..."
          Start-Process -FilePath ".\exness5setup.exe" -ArgumentList "/auto" -Wait
          Write-Host "Installation completed."

      - name: Verify MT5 Executable Presence
        shell: powershell
        run: |
          $paths = @(
              "C:\Program Files\MetaTrader 5 EXNESS\terminal64.exe",
              "C:\Program Files\Exness MetaTrader 5\terminal64.exe",
              "C:\Program Files\MetaTrader 5\terminal64.exe"
          )
          $found = $false
          foreach ($path in $paths) {
              if (Test-Path $path) {
                  Write-Host "Success: Found MT5 executable at $path"
                  $found = $true
                  break
              }
          }
          if (-not $found) {
              Write-Warning "Warning: MT5 executable not found at fallback paths."
              Get-ChildItem -Path "C:\Program Files" -Filter "*MetaTrader*" -Recurse -ErrorAction SilentlyContinue
          }

      - name: Create Portable MT5 Instance
        shell: powershell
        run: |
          $paths = @(
              "C:\Program Files\MetaTrader 5 EXNESS",
              "C:\Program Files\Exness MetaTrader 5",
              "C:\Program Files\MetaTrader 5"
          )
          $installedPath = $null
          foreach ($path in $paths) {
              if (Test-Path $path) {
                  $installedPath = $path
                  break
              }
          }
          if ($installedPath) {
              Write-Host "Found MT5 installation at $installedPath. Copying to C:\MT5..."
              Copy-Item -Path $installedPath -Destination "C:\MT5" -Recurse -Force
              Write-Host "Copied successfully to C:\MT5."
          } else {
              Write-Error "Could not find MT5 installation to copy."
              exit 1
          }

      - name: Configure MetaTrader 5 (Enable Algo Trading)
        shell: powershell
        run: |
          $configPath = "C:\MT5\config"
          if (-not (Test-Path $configPath)) {
              New-Item -ItemType Directory -Path $configPath -Force
          }
          $iniPath = Join-Path $configPath "common.ini"
          $iniContent = "[Experts]`r`nEnabled=1`r`nAllowLiveTrading=1`r`nAllowDllImport=1"
          Set-Content -Path $iniPath -Value $iniContent -Encoding Ascii
          Set-ItemProperty -Path $iniPath -Name IsReadOnly -Value $true
          Write-Host "Configured MT5 at $iniPath and set to Read-Only."

      - name: Run Connection & AutoTrading Test
        shell: powershell
        run: |
          Write-Host "Verifying MT5 connection and trade execution capability..."
          $code = @(
              "import os, sys, time",
              "import MetaTrader5 as mt5",
              "login = int(os.environ.get('MT5_LOGIN', 0))",
              "server = os.environ.get('MT5_SERVER', '')",
              "password = os.environ.get('MT5_PASSWORD', '')",
              "portable = os.environ.get('GITHUB_ACTIONS') == 'true'",
              "print('Initializing MT5 connection...')",
              "if not mt5.initialize(login=login, server=server, password=password, portable=portable):",
              "    fallback_paths = [",
              "        'C:\\MT5\\terminal64.exe',",
              "        'C:\\Program Files\\MetaTrader 5 EXNESS\\terminal64.exe',",
              "        'C:\\Program Files\\Exness MetaTrader 5\\terminal64.exe',",
              "        'C:\\Program Files\\MetaTrader 5\\terminal64.exe'",
              "    ]",
              "    initialized = False",
              "    for p in fallback_paths:",
              "        print(f'Default init failed. Retrying: {p}')",
              "        if mt5.initialize(path=p, login=login, server=server, password=password, portable=portable):",
              "            initialized = True",
              "            break",
              "    if not initialized:",
              "        print(f'MT5 initialization failed: {mt5.last_error()}')",
              "        sys.exit(1)",
              "print('=== MT5 CONNECTION SUCCESS ===')",
              "info = mt5.account_info()",
              "print(f'Account Login: {info.login}')",
              "print(f'Account Balance: {info.balance} {info.currency}')",
              "print(f'Account Broker/Server: {info.server}')",
              "print('=== AUTOMATION CHECKS ===')",
              "term = mt5.terminal_info()",
              "if term.trade_allowed:",
              "    print('[SUCCESS]: Algorithmic Trading (AutoTrading) is ENABLED in terminal!')",
              "else:",
              "    print('[ERROR]: Algorithmic Trading is DISABLED in terminal!')",
              "    sys.exit(1)",
              "if info.trade_allowed:",
              "    print('[SUCCESS]: Trading is allowed on this Account!')",
              "else:",
              "    print('[ERROR]: Trading is not allowed on this Account!')",
              "    sys.exit(1)",
              "print('=== REAL TRADE EXECUTION TEST ===')",
              "symbol = 'XAUUSDm'",
              "if not mt5.symbol_select(symbol, True):",
              "    print(f'[ERROR]: Symbol {symbol} not available for trading!')",
              "    sys.exit(1)",
              "tick = mt5.symbol_info_tick(symbol)",
              "if tick is None:",
              "    print(f'[ERROR]: Could not fetch tick for {symbol}!')",
              "    sys.exit(1)",
              "sym_info = mt5.symbol_info(symbol)",
              "volume = sym_info.volume_min if sym_info else 0.01",
              "price = tick.ask",
              "print(f'Sending test BUY order for {symbol} at {price} with volume {volume}...')",
              "request = {",
              "    'action': mt5.TRADE_ACTION_DEAL,",
              "    'symbol': symbol,",
              "    'volume': volume,",
              "    'type': mt5.ORDER_TYPE_BUY,",
              "    'price': price,",
              "    'comment': 'test_trade_check',",
              "    'type_time': mt5.ORDER_TIME_GTC,",
              "    'type_filling': mt5.ORDER_FILLING_IOC,",
              "}",
              "res = mt5.order_send(request)",
              "if res is None or res.retcode != mt5.TRADE_RETCODE_DONE:",
              "    ret = getattr(res, 'retcode', 'None')",
              "    comm = getattr(res, 'comment', 'Unknown error')",
              "    print(f'[ERROR]: Test trade execution failed! Retcode: {ret}, Comment: {comm}')",
              "    sys.exit(1)",
              "ticket = res.order",
              "print(f'[SUCCESS]: Test trade opened successfully! Ticket ID: {ticket}')",
              "print('Waiting 5 seconds before closing the test trade...')",
              "time.sleep(5)",
              "tick = mt5.symbol_info_tick(symbol)",
              "close_price = tick.bid if tick else price",
              "close_request = {",
              "    'action': mt5.TRADE_ACTION_DEAL,",
              "    'symbol': symbol,",
              "    'volume': volume,",
              "    'type': mt5.ORDER_TYPE_SELL,",
              "    'position': ticket,",
              "    'price': close_price,",
              "    'comment': 'test_close_check',",
              "    'type_time': mt5.ORDER_TIME_GTC,",
              "    'type_filling': mt5.ORDER_FILLING_IOC,",
              "}",
              "res_close = mt5.order_send(close_request)",
              "if res_close is None or res_close.retcode != mt5.TRADE_RETCODE_DONE:",
              "    ret_c = getattr(res_close, 'retcode', 'None')",
              "    comm_c = getattr(res_close, 'comment', 'Unknown error')",
              "    print(f'[WARNING]: Test trade close failed! Retcode: {ret_c}, Comment: {comm_c}')",
              "else:",
              "    print(f'[SUCCESS]: Test trade closed successfully! Result code: {res_close.retcode}')",
              "mt5.shutdown()"
          )
          $code | Out-File -FilePath "temp_check.py" -Encoding utf8
          python temp_check.py
          Remove-Item -Path "temp_check.py" -ErrorAction SilentlyContinue
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}

      - name: Run Trading Bot
        shell: powershell
        run: |
          Write-Host "Launching MT5 trading bot..."
          python mt5bot.py
        env:
          PYTHONUNBUFFERED: "1"
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
          FB_API_KEY: ${{ secrets.FB_API_KEY }}

      - name: Upload Trade Journal Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mt5-trade-journal
          path: trade_journal.csv
