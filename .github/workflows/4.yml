name: VPN Task Workflow

on: [workflow_dispatch]

jobs:
  vpn-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install OpenVPN
        run: sudo apt-get update && sudo apt-get install -y openvpn

      - name: Create Auth file
        run: |
          echo "shawonadobestock+tteca@gmail.com" > vpn_auth.txt
          echo "Shawon63@@" >> vpn_auth.txt

      - name: Start VPN
        run: |
          # The --auth-user-pass flag points to the credentials file
          # We use --daemon to run it in the background
          sudo openvpn --config vypr.ovpn --auth-user-pass vpn_auth.txt --daemon
          
          # Wait for the tunnel to establish (crucial step)
          # We monitor for the initialization sequence completion
          timeout 30 sh -c 'until ip addr show tun0 | grep -q "inet"; do sleep 2; done'
          
          echo "VPN is connected."

      - name: Verify IP Location
        run: |
          curl -s https://ifconfig.me
          echo ""
