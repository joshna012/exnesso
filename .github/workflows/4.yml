name: VPN Task Workflow

on: [workflow_dispatch]

jobs:
  vpn-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install OpenVPN
        run: sudo apt-get update && sudo apt-get install -y openvpn

      - name: Create Auth file
        run: |
          echo "shawonadobestock+tteca@gmail.com" > vpn_auth.txt
          echo "Shawon63@@" >> vpn_auth.txt

      - name: Start VPN
        run: |
          # Use your actual filename: Indonesia.ovpn
          sudo openvpn --config Indonesia.ovpn --auth-user-pass vpn_auth.txt --daemon
          
          # Wait for the tunnel to establish
          # This loop checks for the tun0 network interface
          echo "Waiting for VPN connection..."
          timeout 30 sh -c 'until ip addr show tun0 | grep -q "inet"; do sleep 2; done'
          
          echo "VPN is connected."

      - name: Verify IP Location
        run: |
          # This will show you the public IP address currently in use
          curl -s https://ifconfig.me
          echo ""
          
          # Add your automation scripts here (e.g., node script.js)
