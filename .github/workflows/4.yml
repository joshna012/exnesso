name: VyprVPN Windows Runner

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  vpn-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install OpenVPN on Windows
      run: |
        choco install openvpn -y
      shell: powershell

    - name: Download VyprVPN CA Certificate
      run: |
        # VyprVPN-এর অফিশিয়াল সার্টিফিকেট ডাউনলোড
        Invoke-WebRequest -Uri "https://vyprvpn.com" -OutFile "C:\Program Files\OpenVPN\config\://vyprvpn.com.crt"
      shell: powershell

    - name: Create Credentials & Config Files
      env:
        VYPR_USER: ${{ secrets.VYPR_USERNAME }}
        VYPR_PASS: ${{ secrets.VYPR_PASSWORD }}
        VYPR_SERVER: ${{ secrets.VYPR_SERVER }}
      run: |
        # ইউজারনেম ও পাসওয়ার্ড ফাইল তৈরি
        @"
        $env:VYPR_USER
        $env:VYPR_PASS
        "@ | Out-File -FilePath "C:\Program Files\OpenVPN\config\vypr_creds.txt" -Encoding ascii

        # ওভিপিএন কনফিগারেশন ফাইল তৈরি
        @"
        client
        dev tun
        proto udp
        remote $env:VYPR_SERVER 443
        resolv-retry infinite
        nobind
        persist-key
        persist-tun
        ca "C:\\Program Files\\OpenVPN\\config\\://vyprvpn.com.crt"
        auth-user-pass "C:\\Program Files\\OpenVPN\\config\\vypr_creds.txt"
        cipher AES-256-CBC
        auth SHA256
        comp-lzo
        verb 3
        "@ | Out-File -FilePath "C:\Program Files\OpenVPN\config\vypr.ovpn" -Encoding ascii
      shell: powershell

    - name: Connect to VyprVPN (Background)
      run: |
        # ব্যাকগ্রাউন্ড প্রসেস হিসেবে ওপেনভিপিএন চালু করা
        Start-Process "C:\Program Files\OpenVPN\bin\openvpn.exe" -ArgumentList "--config `",C:\Program Files\OpenVPN\config\vypr.ovpn`"" -WindowStyle Hidden
        Start-Sleep -Seconds 10
      shell: powershell

    - name: Auto-Detect IP Info & Sync Windows Timezone
      run: |
        Write-Host "=================================================="
        Write-Host "🌐 FETCHING CURRENT IP INFO & GEOLOCATION"
        Write-Host "=================================================="
        
        # IPInfo থেকে ডেটা নেওয়া
        $ipInfo = Invoke-RestMethod -Uri "https://ipinfo.io"
        
        Write-Host "🎯 Assigned IP: $($ipInfo.ip)"
        Write-Host "📍 Location: $($ipInfo.city), $($ipInfo.region), $($ipInfo.country)"
        Write-Host "⏰ Detected Timezone: $($ipInfo.timezone)"
        
        Write-Host "=================================================="
        Write-Host "⚙️ AUTO-FITTING WINDOWS TIMEZONE WITH IP LOCATION"
        Write-Host "=================================================="
        
        # উইন্ডোজের সিস্টেম টাইমজোন পরিবর্তন
        Set-TimeZone -Name $ipInfo.timezone
        
        Write-Host "✅ Current Windows System Time:"
        Get-Date
        Write-Host "=================================================="
      shell: powershell
