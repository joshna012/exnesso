name: VPN and Screenshot Workflow

on: [workflow_dispatch]

jobs:
  vpn-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install OpenVPN
        run: sudo apt-get update && sudo apt-get install -y openvpn

      - name: Create Auth file
        run: |
          echo "shawonadobestock+tteca@gmail.com" > vpn_auth.txt
          echo "Shawon63@@" >> vpn_auth.txt

      - name: Start VPN
        run: |
          # Start OpenVPN in the background
          sudo openvpn --config Indonesia.ovpn --auth-user-pass vpn_auth.txt --daemon --dev tun0
          
          # Wait for the tun0 interface to get an IP (up to 30 seconds)
          echo "Waiting for VPN tunnel..."
          for i in {1..15}; do
            if ip addr show tun0 | grep -q "inet"; then
              echo "VPN Connected."
              exit 0
            fi
            sleep 2
          done
          echo "VPN failed to connect."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Capture Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.goto('https://browserleaks.com/ip', { waitUntil: 'networkidle2' });
            await page.screenshot({ path: 'ip_check.png', fullPage: true });
            await browser.close();
          })();
          "

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: ip-check-screenshot
          path: ip_check.png
