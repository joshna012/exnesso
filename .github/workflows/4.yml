name: VPN and Screenshot Workflow

on: [workflow_dispatch]

jobs:
  vpn-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Connect to VPN
        uses: koddsson/openvpn-client-action@v1
        with:
          ovpn_config: ${{ github.workspace }}/Indonesia.ovpn
          user: shawonadobestock+tteca@gmail.com
          pass: Shawon63@@

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Capture Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.goto('https://browserleaks.com/ip', { waitUntil: 'networkidle2' });
            await page.screenshot({ path: 'ip_check.png', fullPage: true });
            await browser.close();
          })();
          "

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: ip-check-screenshot
          path: ip_check.png
