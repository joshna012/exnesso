name: Test MT5 Connection & AutoTrading

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  test-connection:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install MetaTrader5 numpy

      - name: Download MetaTrader 5 Installer
        shell: powershell
        run: |
          Write-Host "Downloading Exness MT5 Installer..."
          curl.exe -L -o exness5setup.exe https://download.mql5.com/cdn/web/exness.technologies.ltd/mt5/exness5setup.exe

      - name: Install MetaTrader 5 Silently
        shell: powershell
        run: |
          Write-Host "Installing Exness MT5 (unattended)..."
          Start-Process -FilePath ".\exness5setup.exe" -ArgumentList "/auto" -Wait
          Write-Host "Installation completed."

      - name: Verify MT5 Executable Presence
        shell: powershell
        run: |
          $paths = @(
              "C:\Program Files\MetaTrader 5 EXNESS\terminal64.exe",
              "C:\Program Files\Exness MetaTrader 5\terminal64.exe",
              "C:\Program Files\MetaTrader 5\terminal64.exe"
          )
          $found = $false
          foreach ($path in $paths) {
              if (Test-Path $path) {
                  Write-Host "Success: Found MT5 executable at $path"
                  $found = $true
                  break
              }
          }
          if (-not $found) {
              Write-Warning "Warning: MT5 executable not found at fallback paths."
              Get-ChildItem -Path "C:\Program Files" -Filter "*MetaTrader*" -Recurse -ErrorAction SilentlyContinue
          }

      - name: Configure MetaTrader 5 (Enable Algo Trading)
        shell: powershell
        run: |
          $paths = @(
              "C:\Program Files\MetaTrader 5 EXNESS",
              "C:\Program Files\Exness MetaTrader 5",
              "C:\Program Files\MetaTrader 5"
          )
          foreach ($path in $paths) {
              if (Test-Path $path) {
                  $configPath = Join-Path $path "config"
                  if (-not (Test-Path $configPath)) {
                      New-Item -ItemType Directory -Path $configPath -Force
                  }
                  $iniPath = Join-Path $configPath "common.ini"
                  $iniContent = @"
[Experts]
AllowLiveTrading=1
AllowDllImport=1
"@
                  Set-Content -Path $iniPath -Value $iniContent -Encoding Unicode
                  Write-Host "Configured MT5 at $iniPath"
              }
          }

      - name: Run Connection Test
        shell: powershell
        run: |
          Write-Host "Running connection & autotrading check..."
          python test_connection.py
        env:
          PYTHONUNBUFFERED: "1"
          MT5_LOGIN: ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD: ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER: ${{ secrets.MT5_SERVER }}
