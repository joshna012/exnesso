name: Squid Proxy with External Access

on:
  workflow_dispatch: # এটি ম্যানুয়ালি রান করার জন্য

jobs:
  setup-squid-external:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Squid
      run: |
        sudo apt-get update
        sudo apt-get install -y squid
        # সব ট্রাফিক অ্যালাউ করার জন্য কনফিগারেশন পরিবর্তন
        sudo sed -i 's/http_access deny all/http_access allow all/' /etc/squid/squid.conf
        sudo systemctl restart squid

    - name: Install ngrok
      run: |
        curl -s https://amazonaws.com | sudo tee /etc/apt/trusted.gpg.md5 > /dev/null
        echo "deb https://amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok

    - name: Start ngrok Tunnel for Squid
      env:
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # ngrok অথেনটিকেশন সেটআপ
        ngrok config add-authtoken $NGROK_AUTHTOKEN
        
        # Squid-এর ডিফল্ট পোর্ট ৩১২৮ কে পাবলিকলি এক্সপোজ করা হচ্ছে TCP টানেলের মাধ্যমে
        ngrok tcp 3128 --log=stdout > ngrok.log &
        
        # টানেলটি চালু হওয়ার জন্য ৫ সেকেন্ড অপেক্ষা করুন
        sleep 5

    - name: Get External Host and Port
      run: |
        # ngrok API থেকে পাবলিক অ্যাড্রেস এবং পোর্ট বের করা হচ্ছে
        PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        # 'tcp://' অংশটি বাদ দিয়ে শুধু হোস্ট এবং পোর্ট আলাদা করা হচ্ছে
        CLEAN_URL=$(echo $PUBLIC_URL | sed 's/tcp:\/\///')
        EXT_HOST=$(echo $CLEAN_URL | cut -d':' -f1)
        EXT_PORT=$(echo $CLEAN_URL | cut -d':' -f2)
        
        echo "=========================================="
        echo "Squid Proxy is now Accessible from OUTSIDE!"
        echo "External Host: $EXT_HOST"
        echo "External Port: $EXT_PORT"
        echo "Your Proxy String: http://$EXT_HOST:$EXT_PORT"
        echo "=========================================="
        
    - name: Keep Workflow Alive
      run: |
        # টানেলটি সচল রাখতে এবং আপনাকে কানেক্ট করার সময় দিতে ওয়ার্কফ্লোটিকে ৩০ মিনিট চালু রাখবে
        # আপনি চাইলে সময় (30m) বাড়িয়ে বা কমিয়ে নিতে পারেন
        echo "Waiting for external connections..."
        sleep 30m
