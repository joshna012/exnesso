name: Squid Proxy with ngrok

on:
  workflow_dispatch:

jobs:
  setup-squid:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y squid curl jq unzip

    - name: Configure Squid
      run: |
        sudo sed -i 's/http_access deny all/http_access allow all/' /etc/squid/squid.conf
        sudo service squid restart || sudo service squid start

    - name: Install ngrok
      run: |
        curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip -o ngrok.zip
        unzip ngrok.zip
        sudo mv ngrok /usr/local/bin/ngrok
        ngrok version

    - name: Start ngrok Tunnel
      run: |
        ngrok config add-authtoken "3DXAj4kKNn5FF5vZy2IE1yfz4D6_3d7iVh8d69V52uFmHJCm6"
        nohup ngrok tcp 3128 --log=stdout > ngrok.log 2>&1 &

        sleep 8

    - name: Get Tunnel Info
      run: |
        PUBLIC_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')

        CLEAN_URL=$(echo $PUBLIC_URL | sed 's/tcp:\/\///')
        EXT_HOST=$(echo $CLEAN_URL | cut -d':' -f1)
        EXT_PORT=$(echo $CLEAN_URL | cut -d':' -f2)

        echo "=========================================="
        echo "Squid Proxy Ready"
        echo "Host: $EXT_HOST"
        echo "Port: $EXT_PORT"
        echo "Proxy: $EXT_HOST:$EXT_PORT"
        echo "=========================================="

    - name: Keep Alive
      run: sleep 30m
